name: kipepeo
description: "High-Frequency Micro-Lending Risk Engine for Offline Markets"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_sms_inbox: ^1.0.3
  permission_handler: ^11.3.1
  sqflite: ^2.3.3+3
  path: ^1.9.0
  intl: ^0.19.0
  tflite_flutter: ^0.10.4
  crypto: ^3.0.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: false
  image_path: "assets/butterfly.png"

flutter:
  uses-material-design: true
  assets:
    - assets/butterfly.png
  # Assets will be added here once the model files are physically present in the directory.
  # assets:
  #   - assets/models/kipepeo_risk_model.tflite
